[org/gnome/mutter]
dynamic-workspaces=false

[org/gnome/shell]
enabled-extensions=['copyous@boerdereinar.dev', 'ddterm@amezin.github.com', 'simple-tiling@domoel', 'auto-move-windows@gnome-shell-extensions.gcampax.github.com']

[org/gnome/desktop/wm/preferences]
num-workspaces=9

[org/gnome/desktop/input-sources]
sources=[('xkb', 'us'), ('xkb', 'ru')]
xkb-options=['grp:caps_toggle']

[org/gnome/desktop/wm/keybindings]
close=['<Super>q']
toggle-fullscreen=['<Super><Shift>f']
switch-input-source=@as []
switch-input-source-backward=@as []
switch-to-workspace-1=['<Super>1']
switch-to-workspace-2=['<Super>2']
switch-to-workspace-3=['<Super>3']
switch-to-workspace-4=['<Super>4']
switch-to-workspace-5=['<Super>5']
switch-to-workspace-6=['<Super>6']
switch-to-workspace-7=['<Super>7']
switch-to-workspace-8=['<Super>8']
switch-to-workspace-9=['<Super>9']
switch-to-workspace-left=['<Super><Shift>Left']
switch-to-workspace-right=['<Super><Shift>Right']
move-to-workspace-1=['<Super><Shift>1']
move-to-workspace-2=['<Super><Shift>2']
move-to-workspace-3=['<Super><Shift>3']
move-to-workspace-4=['<Super><Shift>4']
move-to-workspace-5=['<Super><Shift>5']
move-to-workspace-6=['<Super><Shift>6']
move-to-workspace-7=['<Super><Shift>7']
move-to-workspace-8=['<Super><Shift>8']
move-to-workspace-9=['<Super><Shift>9']

[org/gnome/shell/keybindings]
switch-to-application-1=@as []
switch-to-application-2=@as []
switch-to-application-3=@as []
switch-to-application-4=@as []
switch-to-application-5=@as []
switch-to-application-6=@as []
switch-to-application-7=@as []
switch-to-application-8=@as []
switch-to-application-9=@as []

[org/gnome/settings-daemon/plugins/media-keys]
custom-keybindings=['/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/terminal/', '/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/files/', '/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/yazi/', '/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/browser/', '/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/mail/', '/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/code/', '/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/editor/', '/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/monitoring/', '/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/yazi-scratchpad/']

[org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/terminal]
name='Kitty'
command='kitty'
binding='<Super>BackSpace'

[org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/files]
name='Files'
command='nautilus'
binding='<Super>f'

[org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/yazi]
name='Yazi'
command='kitty yazi'
binding='<Super>g'

[org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/browser]
name='Firefox'
command='firefox'
binding='<Super>b'

[org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/mail]
name='Thunderbird'
command='thunderbird'
binding='<Super>m'

[org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/code]
name='Zed'
command='zed-editor'
binding='<Super>c'

[org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/editor]
name='Text Editor'
command='gnome-text-editor'
binding='<Super>e'

[org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/monitoring]
name='Bottom'
command='kitty --title monitoring btm'
binding='<Super>i'

[org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/yazi-scratchpad]
name='Yazi scratchpad'
command='kitty --title yazi yazi'
binding='<Super>y'

[org/gnome/shell/extensions/auto-move-windows]
application-list=['firefox.desktop:2', 'thunderbird.desktop:3', 'org.gnome.Fractal.desktop:4', 'org.telegram.desktop.desktop:4']

[com/github/amezin/ddterm]
ddterm-toggle-hotkey=['<Super><Shift>BackSpace']

[org/gnome/shell/extensions/simple-tiling/domoel]
inner-gap=5
outer-gap-horizontal=5
outer-gap-vertical=5
focus-left=['<Super>Left']
focus-right=['<Super>Right']
focus-up=['<Super>Up']
focus-down=['<Super>Down']
swap-master-window=@as []
swap-left-window=@as []
swap-right-window=@as []
swap-up-window=@as []
swap-down-window=@as []
