format = """
$directory\
$git_branch\
$git_status\
"""

add_newline = false

[directory]
disabled = false
format = "[$path]($style) "
truncation_length = 8
truncation_symbol = "…/"
truncate_to_repo = false

[git_branch]
disabled = false
format = "[$symbol$branch(:$remote_branch)]($style) "

[git_status]
disabled = false
format = "([$all_status$ahead_behind]($style) )"
