[[mgr.prepend_keymap]]
on = "!"
for = "unix"
run = 'shell "$SHELL" --block'
desc = "Open $SHELL here"

[[input.prepend_keymap]]
on = "<Esc>"
run = "close"
desc = "Cancel input"

# -== plugin hxjump ==-
[[mgr.prepend_keymap]]
on = "n"
run = "plugin hxjump"
desc = "Jump to an item by label"

# -== plugin sshfs ==-
[[mgr.prepend_keymap]]
on = [ "M", "s" ]
run = "plugin sshfs -- menu"
desc = "Open SSHFS options"

# -== plugin eza-preview ==-
[[mgr.prepend_keymap]]
on = [ "e", "t" ]
run = "plugin eza-preview"
desc = "Toggle tree/list directory preview"

[[mgr.prepend_keymap]]
on = [ "e", "+" ]
run = "plugin eza-preview inc-level"
desc = "Increase directory preview depth"

[[mgr.prepend_keymap]]
on = [ "e", "-" ]
run = "plugin eza-preview dec-level"
desc = "Decrease directory preview depth"

[[mgr.prepend_keymap]]
on = [ "e", "." ]
run = "plugin eza-preview toggle-hidden"
desc = "Toggle hidden files in directory preview"

[[mgr.prepend_keymap]]
on = [ "e", "i" ]
run = "plugin eza-preview toggle-git-ignore"
desc = "Toggle gitignored files in directory preview"

[[mgr.prepend_keymap]]
on = [ "e", "g" ]
run = "plugin eza-preview toggle-git-status"
desc = "Toggle Git status in directory preview"

# -== plugin ouch ==-
[[mgr.prepend_keymap]]
on = [ "C" ]
run = "plugin ouch"
desc = "Compress with ouch"

# -== plugin chmod ==-
[[mgr.prepend_keymap]]
on = [ "c", "m" ]
run = "plugin chmod"
desc = "Chmod on selected files"

# -== plugin linemode-plus ==-
[[mgr.prepend_keymap]]
on = [ "m", "c" ]
run = "linemode size_mtime"
desc = "Linemode: size and modified time"

# -== plugin copy-file-contents ==-
[[mgr.prepend_keymap]]
on = [ "y", "c" ]
run = "plugin copy-file-contents"
desc = "Copy file contents to clipboard"

# -== plugin smart-enter ==-
[[mgr.prepend_keymap]]
on = "<Right>"
run = "plugin smart-enter"
desc = "Enter the child directory, or open the file"

# -== plugin smart-paste ==-
[[mgr.prepend_keymap]]
on = "p"
run = "plugin smart-paste"
desc = "Paste into the hovered directory or CWD"

# -== plugin copy-as ==-
[[mgr.prepend_keymap]]
on = "Y"
run = "plugin copy-as"
desc = "Copy hovered file to a new name in the current directory"

# -== plugin smart-tab ==-
[[mgr.prepend_keymap]]
on = [ "t", "t" ]
run = "plugin smart-tab"
desc = "Create a tab and enter the hovered directory"

# -== plugin split-tabs ==-
[[mgr.prepend_keymap]]
on = "\\"
run = "plugin split-tabs spl_toggle"
desc = "Split-tabs: toggle split tabs mode"

[[mgr.prepend_keymap]]
on = "<Tab>"
run = "plugin split-tabs spl_switch_tab"
desc = "Split-tabs: switch to the other pane"

[[mgr.prepend_keymap]]
on = "P"
run = "plugin split-tabs spl_preview"
desc = "Split-tabs: toggle preview pane"

# -== plugin smart-switch ==-
[[mgr.prepend_keymap]]
on = "2"
run = "plugin smart-switch 1"
desc = "Switch or create tab 2"

# -== plugin confirm-quit ==-
[[mgr.prepend_keymap]]
on = "q"
run = "plugin confirm-quit"

# -== plugin tv ==-
[[mgr.prepend_keymap]]
on = [ "T", "f" ]
run = "plugin tv"
desc = "Jump to a file via television"

[[mgr.prepend_keymap]]
on = [ "T", "d" ]
run = "plugin tv dirs"
desc = "Jump to a directory via television"

[[mgr.prepend_keymap]]
on = [ "T", "t" ]
run = "plugin tv text"
desc = "Open files using neovim and jump to where the string is located"
